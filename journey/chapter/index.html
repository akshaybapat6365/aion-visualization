<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Chapter Redirect - Aion</title>
  </head>
  <body data-compat-redirect="app-shell">
    <script>
      (function () {
        function normalizeChapterId(raw) {
          if (!raw) return 'ch1';
          var value = String(raw).trim().toLowerCase();
          if (/^ch([1-9]|1[0-4])$/.test(value)) return value;
          var numberMatch = value.match(/(?:chapter-)?([1-9]|1[0-4])$/);
          return numberMatch ? 'ch' + numberMatch[1] : 'ch1';
        }

        var query = new URLSearchParams(window.location.search);
        var chapterId = normalizeChapterId(query.get('id') || window.location.pathname.split('/').filter(Boolean).pop());

        try {
          sessionStorage.setItem('aion-spa-redirect', '/journey/chapter/' + chapterId);
        } catch (error) {
          console.warn('Could not persist redirect target', error);
        }

        window.location.replace('../../');
      }());
    </script>
  </body>
</html>
