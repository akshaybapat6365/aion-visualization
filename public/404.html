<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Aion Redirect</title>
  </head>
  <body>
    <script>
      (function () {
        var repoBase = '/aion-visualization';
        var path = window.location.pathname;
        var target = path.indexOf(repoBase) === 0 ? path.slice(repoBase.length) : path;
        target = target || '/';
        sessionStorage.setItem('aion-spa-redirect', target + window.location.search + window.location.hash);
        window.location.replace(path.indexOf(repoBase) === 0 ? repoBase + '/' : '/');
      }());
    </script>
  </body>
</html>
