name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    name: App quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Validate canonical data
        run: npm run validate:consistency

      - name: Verify chapter shell contracts
        run: npm run ci:chapter-shell

      - name: Run app contract tests
        run: npm run test:app

      - name: Run legacy test suite
        run: npm test

      - name: Build app
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run app shell smoke
        timeout-minutes: 20
        run: npm run test:e2e:app

      - name: Run app accessibility smoke
        timeout-minutes: 10
        run: npm run test:a11y:app

      - name: Build GitHub Pages artifact
        run: npm run build:pages

      - name: Run Pages artifact smoke
        timeout-minutes: 10
        run: npm run test:pages:artifact
